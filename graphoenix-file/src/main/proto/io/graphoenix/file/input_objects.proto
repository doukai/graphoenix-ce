syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.graphoenix.file.dto.inputObjectType.grpc";

package io.graphoenix.file;

import "io/graphoenix/file/enums.proto";
import "io/graphoenix/core/enums.proto";
import "io/graphoenix/core/input_objects.proto";
import "google/protobuf/timestamp.proto";

/**
* Query Expression Input for 文件
*/
message FileExpression {
    io.graphoenix.core.StringExpression id = 1; /* ID */
    io.graphoenix.core.StringExpression name = 2; /* 文件名 */
    io.graphoenix.core.StringExpression content_type = 3; /* 类型 */
    io.graphoenix.core.StringExpression content = 4; /* 内容 */
    io.graphoenix.core.StringExpression url = 5; /* URL */
    bool include_deprecated = 6; /* Include Deprecated */
    io.graphoenix.core.IntExpression version = 7; /* Version */
    io.graphoenix.core.IntExpression realm_id = 8; /* Realm ID */
    io.graphoenix.core.StringExpression create_user_id = 9; /* Create User ID */
    io.graphoenix.core.StringExpression create_time = 10; /* Create Time */
    io.graphoenix.core.StringExpression update_user_id = 11; /* Update User ID */
    io.graphoenix.core.StringExpression update_time = 12; /* Update Time */
    io.graphoenix.core.StringExpression create_group_id = 13; /* Create Group ID */
    io.graphoenix.core.StringExpression intro_typename = 14; /* Type Name */
    io.graphoenix.core.IntExpression create_time_year = 15; /* Year of Create Time */
    io.graphoenix.core.IntExpression create_time_month = 16; /* Month of Create Time */
    io.graphoenix.core.IntExpression create_time_day = 17; /* Day of Create Time */
    io.graphoenix.core.IntExpression create_time_week = 18; /* Week of Create Time */
    io.graphoenix.core.IntExpression create_time_quarter = 19; /* Quarter of Create Time */
    io.graphoenix.core.IntExpression update_time_year = 20; /* Year of Update Time */
    io.graphoenix.core.IntExpression update_time_month = 21; /* Month of Update Time */
    io.graphoenix.core.IntExpression update_time_day = 22; /* Day of Update Time */
    io.graphoenix.core.IntExpression update_time_week = 23; /* Week of Update Time */
    io.graphoenix.core.IntExpression update_time_quarter = 24; /* Quarter of Update Time */
    bool not = 25; /* Not */
    io.graphoenix.core.Conditional cond = 26; /* Condition */
    repeated FileExpression exs = 27; /* Expressions */
    FileOrderBy order_by = 28; /* Order By */
    FileGroupBy group_by = 29; /* Group By */
    int32 first = 30; /* First */
    int32 last = 31; /* Last */
    int32 offset = 32; /* Offset */
    string after = 33; /* After */
    string before = 34; /* Before */
}
/**
* Mutation Input for 文件
*/
message FileInput {
    string id = 1; /* ID */
    string name = 2; /* 文件名 */
    string content_type = 3; /* 类型 */
    string content = 4; /* 内容 */
    string url = 5; /* URL */
    bool is_deprecated = 6; /* Is Deprecated */
    int32 version = 7; /* Version */
    int32 realm_id = 8; /* Realm ID */
    string create_user_id = 9; /* Create User ID */
    google.protobuf.Timestamp create_time = 10; /* Create Time */
    string update_user_id = 11; /* Update User ID */
    google.protobuf.Timestamp update_time = 12; /* Update Time */
    string create_group_id = 13; /* Create Group ID */
    string intro_typename = 14; /* Type Name */
    FileInput input = 15; /* Input */
    repeated FileInput list = 16; /* Input List */
    FileExpression where = 17; /* Where */
}
/**
* Order Input for 文件
*/
message FileOrderBy {
    io.graphoenix.core.Sort id = 1; /* ID */
    io.graphoenix.core.Sort name = 2; /* 文件名 */
    io.graphoenix.core.Sort content_type = 3; /* 类型 */
    io.graphoenix.core.Sort content = 4; /* 内容 */
    io.graphoenix.core.Sort url = 5; /* URL */
    io.graphoenix.core.Sort is_deprecated = 6; /* Is Deprecated */
    io.graphoenix.core.Sort version = 7; /* Version */
    io.graphoenix.core.Sort realm_id = 8; /* Realm ID */
    io.graphoenix.core.Sort create_user_id = 9; /* Create User ID */
    io.graphoenix.core.Sort create_time = 10; /* Create Time */
    io.graphoenix.core.Sort update_user_id = 11; /* Update User ID */
    io.graphoenix.core.Sort update_time = 12; /* Update Time */
    io.graphoenix.core.Sort create_group_id = 13; /* Create Group ID */
    io.graphoenix.core.Sort intro_typename = 14; /* Type Name */
    io.graphoenix.core.Sort id_count = 15; /* Count of 文件 */
    io.graphoenix.core.Sort name_count = 16; /* Count of 文件名 */
    io.graphoenix.core.Sort content_type_count = 17; /* Count of 类型 */
    io.graphoenix.core.Sort content_count = 18; /* Count of 内容 */
    io.graphoenix.core.Sort url_count = 19; /* Count of URL */
    io.graphoenix.core.Sort create_time_year = 20; /* Year of Create Time */
    io.graphoenix.core.Sort create_time_month = 21; /* Month of Create Time */
    io.graphoenix.core.Sort create_time_day = 22; /* Day of Create Time */
    io.graphoenix.core.Sort create_time_week = 23; /* Week of Create Time */
    io.graphoenix.core.Sort create_time_quarter = 24; /* Quarter of Create Time */
    io.graphoenix.core.Sort update_time_year = 25; /* Year of Update Time */
    io.graphoenix.core.Sort update_time_month = 26; /* Month of Update Time */
    io.graphoenix.core.Sort update_time_day = 27; /* Day of Update Time */
    io.graphoenix.core.Sort update_time_week = 28; /* Week of Update Time */
    io.graphoenix.core.Sort update_time_quarter = 29; /* Quarter of Update Time */
    repeated FileOrderBy obs = 30; /* OrderByes */
}
/**
* Group Input for 文件
*/
message FileGroupBy {
    repeated string by = 1; /* Group By Field Names */
    repeated FileGroupBy gbs = 2; /* OrderByes */
}
message Mutation_singleUpload_Arguments {
    string file = 1;
}
message Mutation_multipleUpload_Arguments {
    repeated string files = 1;
}