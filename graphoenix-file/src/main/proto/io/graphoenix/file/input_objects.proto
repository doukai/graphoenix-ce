syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.graphoenix.file.dto.inputObjectType.grpc";

package io.graphoenix.file;

import "io/graphoenix/file/enums.proto";
import "io/graphoenix/core/enums.proto";
import "io/graphoenix/core/input_objects.proto";
import "google/protobuf/timestamp.proto";

/**
* Query Expression Input for 文件
*/
message FileExpression {
    io.graphoenix.core.StringExpression id = 1; /* ID */
    io.graphoenix.core.StringExpression name = 2; /* 文件名 */
    io.graphoenix.core.StringExpression content_type = 3; /* 类型 */
    io.graphoenix.core.IntExpression content_length = 4; /* 长度 */
    io.graphoenix.core.StringExpression content = 5; /* 内容 */
    io.graphoenix.core.StringExpression url = 6; /* URL */
    bool include_deprecated = 7; /* Include Deprecated */
    io.graphoenix.core.IntExpression version = 8; /* Version */
    io.graphoenix.core.IntExpression realm_id = 9; /* Realm ID */
    io.graphoenix.core.StringExpression create_user_id = 10; /* Create User ID */
    io.graphoenix.core.StringExpression create_time = 11; /* Create Time */
    io.graphoenix.core.StringExpression update_user_id = 12; /* Update User ID */
    io.graphoenix.core.StringExpression update_time = 13; /* Update Time */
    io.graphoenix.core.StringExpression create_group_id = 14; /* Create Group ID */
    io.graphoenix.core.StringExpression intro_typename = 15; /* Type Name */
    io.graphoenix.core.IntExpression create_time_year = 16; /* Year of Create Time */
    io.graphoenix.core.IntExpression create_time_month = 17; /* Month of Create Time */
    io.graphoenix.core.IntExpression create_time_day = 18; /* Day of Create Time */
    io.graphoenix.core.IntExpression create_time_week = 19; /* Week of Create Time */
    io.graphoenix.core.IntExpression create_time_quarter = 20; /* Quarter of Create Time */
    io.graphoenix.core.IntExpression update_time_year = 21; /* Year of Update Time */
    io.graphoenix.core.IntExpression update_time_month = 22; /* Month of Update Time */
    io.graphoenix.core.IntExpression update_time_day = 23; /* Day of Update Time */
    io.graphoenix.core.IntExpression update_time_week = 24; /* Week of Update Time */
    io.graphoenix.core.IntExpression update_time_quarter = 25; /* Quarter of Update Time */
    bool not = 26; /* Not */
    io.graphoenix.core.Conditional cond = 27; /* Condition */
    repeated FileExpression exs = 28; /* Expressions */
    FileOrderBy order_by = 29; /* Order By */
    FileGroupBy group_by = 30; /* Group By */
    int32 first = 31; /* First */
    int32 last = 32; /* Last */
    int32 offset = 33; /* Offset */
    string after = 34; /* After */
    string before = 35; /* Before */
}
/**
* Mutation Input for 文件
*/
message FileInput {
    string id = 1; /* ID */
    string name = 2; /* 文件名 */
    string content_type = 3; /* 类型 */
    int32 content_length = 4; /* 长度 */
    string content = 5; /* 内容 */
    string url = 6; /* URL */
    bool is_deprecated = 7; /* Is Deprecated */
    int32 version = 8; /* Version */
    int32 realm_id = 9; /* Realm ID */
    string create_user_id = 10; /* Create User ID */
    google.protobuf.Timestamp create_time = 11; /* Create Time */
    string update_user_id = 12; /* Update User ID */
    google.protobuf.Timestamp update_time = 13; /* Update Time */
    string create_group_id = 14; /* Create Group ID */
    string intro_typename = 15; /* Type Name */
    FileInput input = 16; /* Input */
    repeated FileInput list = 17; /* Input List */
    FileExpression where = 18; /* Where */
}
/**
* Order Input for 文件
*/
message FileOrderBy {
    io.graphoenix.core.Sort id = 1; /* ID */
    io.graphoenix.core.Sort name = 2; /* 文件名 */
    io.graphoenix.core.Sort content_type = 3; /* 类型 */
    io.graphoenix.core.Sort content_length = 4; /* 长度 */
    io.graphoenix.core.Sort content = 5; /* 内容 */
    io.graphoenix.core.Sort url = 6; /* URL */
    io.graphoenix.core.Sort is_deprecated = 7; /* Is Deprecated */
    io.graphoenix.core.Sort version = 8; /* Version */
    io.graphoenix.core.Sort realm_id = 9; /* Realm ID */
    io.graphoenix.core.Sort create_user_id = 10; /* Create User ID */
    io.graphoenix.core.Sort create_time = 11; /* Create Time */
    io.graphoenix.core.Sort update_user_id = 12; /* Update User ID */
    io.graphoenix.core.Sort update_time = 13; /* Update Time */
    io.graphoenix.core.Sort create_group_id = 14; /* Create Group ID */
    io.graphoenix.core.Sort intro_typename = 15; /* Type Name */
    io.graphoenix.core.Sort id_count = 16; /* Count of 文件 */
    io.graphoenix.core.Sort name_count = 17; /* Count of 文件名 */
    io.graphoenix.core.Sort content_type_count = 18; /* Count of 类型 */
    io.graphoenix.core.Sort content_length_count = 19; /* Count of 长度 */
    io.graphoenix.core.Sort content_count = 20; /* Count of 内容 */
    io.graphoenix.core.Sort url_count = 21; /* Count of URL */
    io.graphoenix.core.Sort content_length_max = 22; /* Max of 长度 */
    io.graphoenix.core.Sort content_length_min = 23; /* Min of 长度 */
    io.graphoenix.core.Sort content_length_sum = 24; /* Sum of 长度 */
    io.graphoenix.core.Sort content_length_avg = 25; /* Avg of 长度 */
    io.graphoenix.core.Sort create_time_year = 26; /* Year of Create Time */
    io.graphoenix.core.Sort create_time_month = 27; /* Month of Create Time */
    io.graphoenix.core.Sort create_time_day = 28; /* Day of Create Time */
    io.graphoenix.core.Sort create_time_week = 29; /* Week of Create Time */
    io.graphoenix.core.Sort create_time_quarter = 30; /* Quarter of Create Time */
    io.graphoenix.core.Sort update_time_year = 31; /* Year of Update Time */
    io.graphoenix.core.Sort update_time_month = 32; /* Month of Update Time */
    io.graphoenix.core.Sort update_time_day = 33; /* Day of Update Time */
    io.graphoenix.core.Sort update_time_week = 34; /* Week of Update Time */
    io.graphoenix.core.Sort update_time_quarter = 35; /* Quarter of Update Time */
    repeated FileOrderBy obs = 36; /* OrderByes */
}
/**
* Group Input for 文件
*/
message FileGroupBy {
    repeated string by = 1; /* Group By Field Names */
    repeated FileGroupBy gbs = 2; /* OrderByes */
}