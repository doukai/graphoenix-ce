syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.graphoenix.file.dto.objectType.grpc";

package io.graphoenix.file;

import "io/graphoenix/file/enums.proto";
import "io/graphoenix/core/objects.proto";
import "google/protobuf/timestamp.proto";

/**
* 文件
*/
message File {
    string id = 1; /* ID */
    string name = 2; /* 文件名 */
    string content_type = 3; /* 类型 */
    string content = 4; /* 内容 */
    string url = 5; /* URL */
    bool is_deprecated = 6; /* Is Deprecated */
    int32 version = 7; /* Version */
    int32 realm_id = 8; /* Realm ID */
    string create_user_id = 9; /* Create User ID */
    google.protobuf.Timestamp create_time = 10; /* Create Time */
    string update_user_id = 11; /* Update User ID */
    google.protobuf.Timestamp update_time = 12; /* Update Time */
    string create_group_id = 13; /* Create Group ID */
    string intro_typename = 14; /* Type Name */
    int32 id_count = 15; /* Count of 文件 */
    int32 name_count = 16; /* Count of 文件名 */
    int32 content_type_count = 17; /* Count of 类型 */
    int32 content_count = 18; /* Count of 内容 */
    int32 url_count = 19; /* Count of URL */
    int32 create_time_year = 20; /* Year of Create Time */
    int32 create_time_month = 21; /* Month of Create Time */
    int32 create_time_day = 22; /* Day of Create Time */
    int32 create_time_week = 23; /* Week of Create Time */
    int32 create_time_quarter = 24; /* Quarter of Create Time */
    int32 update_time_year = 25; /* Year of Update Time */
    int32 update_time_month = 26; /* Month of Update Time */
    int32 update_time_day = 27; /* Day of Update Time */
    int32 update_time_week = 28; /* Week of Update Time */
    int32 update_time_quarter = 29; /* Quarter of Update Time */
}
/**
* Connection Object for 文件
*/
message FileConnection {
    int32 total_count = 1; /* Total */
    io.graphoenix.core.PageInfo page_info = 2; /* Page Info */
    repeated FileEdge edges = 3; /* Edges */
}
/**
* Edge Object for 文件
*/
message FileEdge {
    File node = 1; /* Node */
    string cursor = 2; /* Cursor */
}