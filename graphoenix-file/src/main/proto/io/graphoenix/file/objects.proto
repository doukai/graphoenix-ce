syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.graphoenix.file.dto.objectType.grpc";

package io.graphoenix.file;

import "io/graphoenix/file/enums.proto";
import "io/graphoenix/core/objects.proto";
import "google/protobuf/timestamp.proto";

/**
* 文件
*/
message File {
    string id = 1; /* ID */
    string name = 2; /* 文件名 */
    string content_type = 3; /* 类型 */
    int32 content_length = 4; /* 长度 */
    string content = 5; /* 内容 */
    string url = 6; /* URL */
    bool is_deprecated = 7; /* Is Deprecated */
    int32 version = 8; /* Version */
    int32 realm_id = 9; /* Realm ID */
    string create_user_id = 10; /* Create User ID */
    google.protobuf.Timestamp create_time = 11; /* Create Time */
    string update_user_id = 12; /* Update User ID */
    google.protobuf.Timestamp update_time = 13; /* Update Time */
    string create_group_id = 14; /* Create Group ID */
    string intro_typename = 15; /* Type Name */
    int32 id_count = 16; /* Count of 文件 */
    int32 name_count = 17; /* Count of 文件名 */
    int32 content_type_count = 18; /* Count of 类型 */
    int32 content_length_count = 19; /* Count of 长度 */
    int32 content_count = 20; /* Count of 内容 */
    int32 url_count = 21; /* Count of URL */
    int32 content_length_max = 22; /* Max of 长度 */
    int32 content_length_min = 23; /* Min of 长度 */
    int32 content_length_sum = 24; /* Sum of 长度 */
    int32 content_length_avg = 25; /* Avg of 长度 */
    int32 create_time_year = 26; /* Year of Create Time */
    int32 create_time_month = 27; /* Month of Create Time */
    int32 create_time_day = 28; /* Day of Create Time */
    int32 create_time_week = 29; /* Week of Create Time */
    int32 create_time_quarter = 30; /* Quarter of Create Time */
    int32 update_time_year = 31; /* Year of Update Time */
    int32 update_time_month = 32; /* Month of Update Time */
    int32 update_time_day = 33; /* Day of Update Time */
    int32 update_time_week = 34; /* Week of Update Time */
    int32 update_time_quarter = 35; /* Quarter of Update Time */
}
/**
* Connection Object for 文件
*/
message FileConnection {
    int32 total_count = 1; /* Total */
    io.graphoenix.core.PageInfo page_info = 2; /* Page Info */
    repeated FileEdge edges = 3; /* Edges */
}
/**
* Edge Object for 文件
*/
message FileEdge {
    File node = 1; /* Node */
    string cursor = 2; /* Cursor */
}